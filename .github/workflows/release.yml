name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x64
            platform: x64
            output_dir: Release_x64
          - name: x86
            platform: Win32
            output_dir: Release_x32

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build WinMTR
        shell: pwsh
        run: |
          msbuild src\WinMTR.sln `
            /t:Build `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:PlatformToolset=v143 `
            /m

      - name: Package WinMTR
        shell: pwsh
        run: |
          $packageRoot = "dist\WinMTR-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          Copy-Item "src\${{ matrix.output_dir }}\WinMTR.exe" "$packageRoot\WinMTR.exe"
          Copy-Item "README.md" "$packageRoot\README.md"
          Copy-Item "LICENSE" "$packageRoot\LICENSE"

          Compress-Archive `
            -Path "$packageRoot\*" `
            -DestinationPath "dist\WinMTR-${{ matrix.name }}.zip" `
            -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinMTR-${{ matrix.name }}
          path: dist/WinMTR-${{ matrix.name }}.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release Assets
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
